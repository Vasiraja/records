<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Worker Simple Example</title>
    <style>
        /* body {
            font-family: Arial, sans-serif;

        #result {

        } */
    </style>
</head>

<body>
    <h2>Simple Web Worker Example</h2>
    <p>Click start to run counting in background.</p>

    <button onclick="startWorker()">Start Worker</button>
    <button onclick="stopWorker()">Stop Worker</button>

    <div id="result">Worker not started yet.</div>

    <script>
        let worker;

        function startWorker() {
            if (worker) {
                return;
            }

            const workerCode = `
        let count = 0;

        function startCounting() {
          setInterval(() => {
            count++;
            postMessage("Count: " + count);
          }, 1000);
        }

        startCounting();
      `;

            const blob = new Blob([workerCode], { type: "application/javascript" });
            const workerURL = URL.createObjectURL(blob);

            worker = new Worker(workerURL);

            worker.onmessage = function (event) {
                document.getElementById("result").innerHTML = event.data;
            };
        }

        function stopWorker() {
            if (worker) {
                worker.terminate();
                worker = null;
                document.getElementById("result").innerHTML = "Worker stopped.";
            }
        }
    </script>
</body>

</html>
