<div #liveToast
     class="toast position-fixed end-0 m-3"
     style="top: 70px;"
     role="alert">
       <div class="toast-header">
    <strong class="me-auto">{{title}}</strong>
    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
  </div>

  <div class="toast-body">
    {{message}}
  </div>
</div>
