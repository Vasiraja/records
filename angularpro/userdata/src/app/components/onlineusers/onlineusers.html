  <div class="online-panel">
  <h3>🟢 Online Now ({{ onlineUsers.length }})</h3>

  <div *ngFor="let user of onlineUsers trackBy:trackById" class="user-item">

     <div class="avatar-wrapper">
      <img [src]="'assets/default-avatar.png'" alt="avatar" />
      <span class="green-dot"></span>   
    </div>

    <span>{{ user.firstname }}</span>
    <small>Joined {{ user.connectedAt | date:'shortTime' }}</small>

  </div> 
 
  <p *ngIf="onlineUsers.length === 0">No users online</p>
</div>
