
<br><br>
<div class="chat-container">

  <div class="messages">

    <div *ngFor="let msg of messages">

      <div
        [ngClass]="msg.senderId === currentUserId ? 'sent' : 'received'">

        {{ msg.text }}

      </div>

    </div>

  </div>

  <div class="chat-input">

    <input
      [(ngModel)]="messageText" 
      placeholder="Type message..." />

    <button (click)="sendMessage()">Send</button>

  </div>

</div>
